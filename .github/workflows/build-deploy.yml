name: Build & Deploy CVD Sim

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: hsunacr
  ACR_LOGIN_SERVER: hsunacr.azurecr.io
  RESOURCE_GROUP: rg-cvd-sim
  CLUSTER_NAME: cvd-cluster

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
    - uses: actions/checkout@v4

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Login to ACR
      run: az acr login --name $ACR_NAME

    - name: Set up QEMU (for ARM cross-build)
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build & push chamber-simulator
      run: |
        docker buildx build \
          --platform linux/amd64 \
          --push \
          -t $ACR_LOGIN_SERVER/chamber-simulator:${{ github.sha }} \
          -t $ACR_LOGIN_SERVER/chamber-simulator:latest \
          -f docker/Dockerfile.simulator .

    - name: Build & push chamber-controller (x86)
      run: |
        docker buildx build \
          --platform linux/amd64 \
          --push \
          -t $ACR_LOGIN_SERVER/chamber-controller:${{ github.sha }} \
          -t $ACR_LOGIN_SERVER/chamber-controller:latest \
          -f docker/Dockerfile.controller .

    - name: Build & push gasbox-controller (ARM64)
      run: |
        docker buildx build \
          --platform linux/arm64 \
          --push \
          -t $ACR_LOGIN_SERVER/gasbox-controller:${{ github.sha }} \
          -t $ACR_LOGIN_SERVER/gasbox-controller:latest \
          -f docker/Dockerfile.controller .

    - name: Build & push hmi-frontend
      run: |
        docker buildx build \
          --platform linux/amd64 \
          --push \
          -t $ACR_LOGIN_SERVER/hmi-frontend:${{ github.sha }} \
          -t $ACR_LOGIN_SERVER/hmi-frontend:latest \
          -f docker/Dockerfile.hmi .

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
    - uses: actions/checkout@v4

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Get AKS credentials
      run: az aks get-credentials --resource-group $RESOURCE_GROUP --name $CLUSTER_NAME --overwrite-existing

    - name: Deploy to AKS
      run: |
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/simulator.yaml
        kubectl apply -f k8s/controller.yaml
        kubectl apply -f k8s/hmi.yaml

    - name: Update image tags
      run: |
        kubectl -n cvd-system set image deployment/chamber-simulator simulator=$ACR_LOGIN_SERVER/chamber-simulator:${{ github.sha }}
        kubectl -n cvd-system set image deployment/chamber-controller controller=$ACR_LOGIN_SERVER/chamber-controller:${{ github.sha }}
        kubectl -n cvd-system set image deployment/hmi-frontend hmi=$ACR_LOGIN_SERVER/hmi-frontend:${{ github.sha }}

    - name: Wait for rollout
      run: |
        kubectl -n cvd-system rollout status deployment/chamber-simulator --timeout=120s
        kubectl -n cvd-system rollout status deployment/chamber-controller --timeout=120s
        kubectl -n cvd-system rollout status deployment/hmi-frontend --timeout=120s
