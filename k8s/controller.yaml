apiVersion: apps/v1
kind: Deployment
metadata:
  name: chamber-controller
  namespace: cvd-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chamber-controller
  template:
    metadata:
      labels:
        app: chamber-controller
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
      - name: controller
        image: hsunacr.azurecr.io/chamber-controller:latest
        ports:
        - containerPort: 8080
        env:
        - name: SIM_HOST
          value: "chamber-simulator.cvd-system.svc.cluster.local"
        - name: SIM_PORT
          value: "5555"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: chamber-controller
  namespace: cvd-system
spec:
  selector:
    app: chamber-controller
  ports:
  - name: hmi
    port: 8080
