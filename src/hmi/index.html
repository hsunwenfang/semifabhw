<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CVD Chamber HMI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; }
  .header { background: #16213e; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 18px; color: #0f9; }
  .status { font-size: 13px; padding: 4px 12px; border-radius: 4px; }
  .status.connected { background: #0a5; }
  .status.disconnected { background: #a00; }
  .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; padding: 20px; }
  .card { background: #16213e; border-radius: 8px; padding: 16px; }
  .card h2 { font-size: 14px; color: #888; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .gauge { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #2a2a4e; }
  .gauge:last-child { border: none; }
  .gauge .label { font-size: 13px; color: #aaa; }
  .gauge .value { font-size: 20px; font-weight: 600; font-family: 'Courier New', monospace; }
  .gauge .unit { font-size: 12px; color: #666; margin-left: 4px; }
  .state-badge { font-size: 16px; padding: 8px 20px; border-radius: 6px; background: #0a5; text-align: center; font-weight: 600; }
  .state-FAULT { background: #a00; }
  .state-PROCESS { background: #07a; }
  .state-PUMP_DOWN { background: #a70; }
  .state-IDLE { background: #555; }
  #log { font-family: 'Courier New', monospace; font-size: 12px; max-height: 300px; overflow-y: auto; background: #0a0a1a; padding: 10px; border-radius: 4px; }
  #log div { padding: 2px 0; border-bottom: 1px solid #1a1a2e; }
</style>
</head>
<body>
<div class="header">
  <h1>CVD Chamber Control</h1>
  <span id="connStatus" class="status disconnected">DISCONNECTED</span>
  <span id="stateDisplay" class="state-badge state-IDLE">IDLE</span>
</div>
<div class="dashboard">
  <div class="card">
    <h2>Process Parameters</h2>
    <div class="gauge"><span class="label">Temperature</span><span class="value" id="temp">--</span><span class="unit">°C</span></div>
    <div class="gauge"><span class="label">Pressure</span><span class="value" id="pressure">--</span><span class="unit">Torr</span></div>
    <div class="gauge"><span class="label">RF Forward</span><span class="value" id="rfFwd">--</span><span class="unit">W</span></div>
    <div class="gauge"><span class="label">RF Reflected</span><span class="value" id="rfRef">--</span><span class="unit">W</span></div>
  </div>
  <div class="card">
    <h2>Actuator Commands</h2>
    <div class="gauge"><span class="label">Heater Power</span><span class="value" id="heater">--</span><span class="unit">%</span></div>
    <div class="gauge"><span class="label">Throttle Pos</span><span class="value" id="throttle">--</span><span class="unit">%</span></div>
    <div class="gauge"><span class="label">RF Setpoint</span><span class="value" id="rfSp">--</span><span class="unit">W</span></div>
  </div>
  <div class="card">
    <h2>Gas Flows (sccm)</h2>
    <div class="gauge"><span class="label">CH1 SiH4</span><span class="value" id="gas0">--</span></div>
    <div class="gauge"><span class="label">CH2 N2O</span><span class="value" id="gas1">--</span></div>
    <div class="gauge"><span class="label">CH3</span><span class="value" id="gas2">--</span></div>
    <div class="gauge"><span class="label">CH4</span><span class="value" id="gas3">--</span></div>
  </div>
  <div class="card">
    <h2>Event Log</h2>
    <div id="log"></div>
  </div>
</div>
<script>
// HMI connects to controller's WebSocket endpoint (placeholder — in real deployment,
// controller would expose a WS endpoint; for now we show static demo data)
const el = (id) => document.getElementById(id);
let connected = false;

function updateDisplay(data) {
  el('temp').textContent = data.temperature.toFixed(1);
  el('pressure').textContent = data.pressure.toFixed(3);
  el('rfFwd').textContent = data.rf_forward.toFixed(0);
  el('rfRef').textContent = data.rf_reflected.toFixed(0);
  el('heater').textContent = data.heater_power.toFixed(1);
  el('throttle').textContent = data.throttle_pos.toFixed(1);
  el('rfSp').textContent = data.rf_setpoint.toFixed(0);
  for (let i = 0; i < 4; i++) el('gas' + i).textContent = data.gas_flows[i].toFixed(1);
  const sd = el('stateDisplay');
  sd.textContent = data.state;
  sd.className = 'state-badge state-' + data.state;
}

function addLog(msg) {
  const d = document.createElement('div');
  d.textContent = new Date().toISOString().substr(11, 8) + ' ' + msg;
  el('log').prepend(d);
  if (el('log').children.length > 100) el('log').lastChild.remove();
}

// Demo: simulate data when no WS connection
let demoSeq = 0;
function demoTick() {
  demoSeq++;
  const t = demoSeq * 0.1;
  const temp = 25 + 375 * (1 - Math.exp(-t / 20));
  const pressure = t < 5 ? 760 * Math.exp(-t) : 2.0 + 0.1 * Math.sin(t);
  const inProcess = t > 15 && t < 75;
  updateDisplay({
    temperature: temp, pressure: pressure,
    rf_forward: inProcess ? 300 : 0, rf_reflected: inProcess ? 15 : 0,
    heater_power: Math.min(100, temp < 400 ? 80 : 20),
    throttle_pos: t < 5 ? 100 : 45,
    rf_setpoint: inProcess ? 300 : 0,
    gas_flows: inProcess ? [100, 50, 0, 0] : [0, 0, 0, 0],
    state: t < 5 ? 'PUMP_DOWN' : t < 15 ? 'GAS_STABILIZE' : t < 75 ? 'PROCESS' : 'PURGE'
  });
  if (demoSeq % 50 === 0) addLog('State: ' + (t < 5 ? 'PUMP_DOWN' : t < 15 ? 'GAS_STABILIZE' : 'PROCESS'));
}
setInterval(demoTick, 100);
el('connStatus').textContent = 'DEMO MODE';
el('connStatus').className = 'status connected';
addLog('HMI started in demo mode');
</script>
</body>
</html>
